{% extends 'accounts/main.html' %}

{% block content %}

<div class="row g-3 p-3">
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">Customer:</h5>
                <hr>
                <button class="btn btn-outline-primary btn-sm w-100 mb-2">Update Customer</button>
                <button class="btn btn-danger btn-sm w-100">Delete Customer</button>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">Contact Information</h5>
                <hr>
                <p class="mb-1"><strong>Email:</strong></p>
                <p class="mb-3">example@example.com</p>
                <p class="mb-1"><strong>Phone:</strong></p>
                <p>+1 234 567 890</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">Total Orders</h5>
                <hr>
                <p class="display-6">0</p>
            </div>
        </div>
    </div>
</div>

<div class="row p-3">
    <div class="col-md-12">
        <div class="card card-body">
            <form class="row g-2 align-items-center">
                <div class="col-auto">
                    <input type="search" class="form-control" placeholder="Search customers">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="row p-3">
    <div class="col-md-12">
        <div class="card card-body">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Date Ordered</th>
                        <th>Status</th>
                        <th>Update</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Order rows go here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
