<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-labelledby="addCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="addCustomerModalLabel">Add Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group mb-3">
                        <label for="add-customer-name">Customer Name</label>
                        <input type="text" class="form-control" id="add-customer-name" name="name" required>
                    </div>
                    <div class="form-group mb-3">
                        <label for="add-customer-phone">Phone</label>
                        <input type="text" class="form-control" id="add-customer-phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="add-customer-email">Email</label>
                        <input type="email" class="form-control" id="add-customer-email" name="email" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Add Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- View Customer Modal -->
<div class="modal fade" id="viewCustomerModal" tabindex="-1" aria-labelledby="viewCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="viewCustomerModalLabel">View Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p><strong>Name:</strong> {{ customer.name }}</p>
                <p><strong>Phone:</strong> {{ customer.phone }}</p>
                <p><strong>Email:</strong> {{ customer.email }}</p>
                <p><strong>Total Orders:</strong> 0</p>
            </div>
        </div>
    </div>
</div>

<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal" tabindex="-1" aria-labelledby="editCustomerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="editCustomerModalLabel">Edit Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group mb-3">
                        <label for="edit-customer-name">Customer Name</label>
                        <input type="text" class="form-control" id="edit-customer-name" name="name" required>
                    </div>
                    <div class="form-group mb-3">
                        <label for="edit-customer-phone">Phone</label>
                        <input type="text" class="form-control" id="edit-customer-phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-customer-email">Email</label>
                        <input type="email" class="form-control" id="edit-customer-email" name="email" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function customerTableBody() {
        return $('#customer-table-body');
    }

    function customerRowHtml(customer) {
        var layout = customerTableBody().data('layout');

        if (layout === 'full') {
            return `
                <tr data-customer-id="${customer.id}">
                    <td>${customer.name}</td>
                    <td>${customer.phone}</td>
                    <td>${customer.email}</td>
                    <td>${customer.total_orders}</td>
                    <td>
                        <button class="btn btn-sm btn-info" data-bs-toggle="modal"
                            data-bs-target="#viewCustomerModal" data-id="${customer.id}"
                            data-name="${customer.name}" data-phone="${customer.phone}"
                            data-email="${customer.email}" data-total-orders="${customer.total_orders}">View</button>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal"
                            data-bs-target="#editCustomerModal" data-id="${customer.id}"
                            data-name="${customer.name}" data-phone="${customer.phone}"
                            data-email="${customer.email}" data-edit-url="/customers/edit/${customer.id}/">Edit</button>
                        <button type="button" class="btn btn-sm btn-danger delete-customer-btn"
                            data-id="${customer.id}" data-delete-url="/customers/delete/${customer.id}/">Delete</button>
                    </td>
                </tr>
            `;
        }

        return `
            <tr data-customer-id="${customer.id}">
                <td>${customer.name}</td>
                <td>${customer.phone}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                        data-bs-target="#editCustomerModal" data-id="${customer.id}"
                        data-name="${customer.name}" data-phone="${customer.phone}"
                        data-email="${customer.email}" data-edit-url="/customers/edit/${customer.id}/">Update</button>
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-danger delete-customer-btn"
                        data-id="${customer.id}" data-delete-url="/customers/delete/${customer.id}/">Delete</button>
                </td>
            </tr>
        `;
    }

    $('#viewCustomerModal').on('show.bs.modal', function (event) {
        var button = $(event.relatedTarget);
        var name = button.data('name');
        var phone = button.data('phone');
        var email = button.data('email');
        var totalOrders = button.data('total-orders');

        var modal = $(this);
        modal.find('.modal-body').html(
            '<p><strong>Name:</strong> ' + name + '</p>' +
            '<p><strong>Phone:</strong> ' + phone + '</p>' +
            '<p><strong>Email:</strong> ' + email + '</p>' +
            '<p><strong>Total Orders:</strong> ' + totalOrders + '</p>'
        );
    });

    $('#editCustomerModal').on('show.bs.modal', function (event) {
        var button = $(event.relatedTarget);
        var name = button.data('name');
        var phone = button.data('phone');
        var email = button.data('email');
        var editUrl = button.data('edit-url');

        var modal = $(this);
        modal.find('#edit-customer-name').val(name);
        modal.find('#edit-customer-phone').val(phone);
        modal.find('#edit-customer-email').val(email);
        modal.find('form').attr('action', editUrl);
    });

    $('#addCustomerModal').on('show.bs.modal', function () {
        var modal = $(this);
        modal.find('#add-customer-name').val('');
        modal.find('#add-customer-phone').val('');
        modal.find('#add-customer-email').val('');
        modal.find('form').attr('action', '{% url "add_customer" %}');
    });

    $('#addCustomerModal form').on('submit', function (e) {
        e.preventDefault();
        $.ajax({
            url: '{% url "add_customer" %}',
            type: 'POST',
            data: $(this).serialize(),
            success: function (response) {
                $('#addCustomerModal').modal('hide');
                customerTableBody().append(customerRowHtml(response));
            },
            error: function () {
                alert('Failed to add customer.');
            }
        });
    });

    $('#editCustomerModal form').on('submit', function (e) {
        e.preventDefault();
        $.ajax({
            url: $(this).attr('action'),
            type: 'POST',
            data: $(this).serialize(),
            success: function (response) {
                $('#editCustomerModal').modal('hide');
                $(`tr[data-customer-id="${response.id}"]`).replaceWith(customerRowHtml(response));
            },
            error: function () {
                alert('Failed to edit customer.');
            }
        });
    });

    $(document).on('click', '.delete-customer-btn', function () {
        var customerId = $(this).data('id');
        var deleteUrl = $(this).data('delete-url');

        if (!confirm('Delete this customer?')) {
            return;
        }

        $.ajax({
            url: deleteUrl,
            type: 'POST',
            data: {
                csrfmiddlewaretoken: '{{ csrf_token }}'
            },
            success: function () {
                $(`tr[data-customer-id="${customerId}"]`).remove();
            },
            error: function () {
                alert('Failed to delete customer.');
            }
        });
    });
</script>
